services:

  # ---------------------------------------------------------------------------
  # Azure Blob Storage emulator
  # Ports: 10000 (blob), 10001 (queue), 10002 (table)
  # Connection string is set in .env.local and local.settings.json
  # ---------------------------------------------------------------------------
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    container_name: trips-azurite
    restart: unless-stopped
    ports:
      - "10000:10000"   # blob
      - "10001:10001"   # queue
      - "10002:10002"   # table
    volumes:
      - azurite-data:/data
    command: azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0

  # ---------------------------------------------------------------------------
  # Azure Cosmos DB Linux emulator (NoSQL / Core SQL API)
  # Docs: https://aka.ms/cosmosdb-emulator-docker
  # TLS is self-signed — set AZURE_COSMOS_DISABLE_SSL_VERIFICATION=true in tests
  # or install the emulator certificate.
  # ---------------------------------------------------------------------------
  cosmos:
    # GA emulator — includes Data Explorer UI at https://localhost:8081/_explorer/index.html
    # Runs via QEMU x86 emulation on Apple Silicon (AMD64 badge in Docker Desktop is expected).
    image: mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator:latest
    platform: linux/amd64
    container_name: trips-cosmos
    restart: unless-stopped
    ports:
      - "8081:8081"     # data plane + Explorer UI
      - "8900:8900"     # gateway
    environment:
      AZURE_COSMOS_EMULATOR_PARTITION_COUNT: "3"
      AZURE_COSMOS_EMULATOR_ENABLE_DATA_PERSISTENCE: "true"
    volumes:
      - cosmos-data:/tmp/cosmos

  # ---------------------------------------------------------------------------
  # Apache Kafka (KRaft mode — no ZooKeeper, ARM64 native via Bitnami image)
  # Kafka API: localhost:9092
  # ---------------------------------------------------------------------------
  kafka:
    # Official Apache Kafka image — ARM64 native, KRaft mode (no ZooKeeper)
    image: apache/kafka:latest
    container_name: trips-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"     # Kafka API (used by KafkaPublisher)
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: "3"

  # ---------------------------------------------------------------------------
  # kafka-ui — web UI for inspecting topics, messages, consumer groups
  # Accessible at http://localhost:8090
  # ---------------------------------------------------------------------------
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: trips-kafka-ui
    restart: unless-stopped
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

volumes:
  azurite-data:
  cosmos-data:
